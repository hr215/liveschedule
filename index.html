<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Host & Content Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg-deep:#0A0C10;
    --bg-panel:#13161C;
    --bg-raised:#1B1F27;
    --bg-raised-2:#20242E;
    --text-primary:#F2F4F7;
    --text-muted:#8B93A1;
    --text-faint:#565D6B;
    --accent-live:#FE2C55;
    --accent-cyan:#25F4EE;
    --border:#262B35;
    --border-soft:#1D212A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% 0%, #14181F 0%, #0A0C10 55%);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Oswald',sans-serif; letter-spacing:0.02em;}
  .eyebrow{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  button{font-family:'Inter',sans-serif; cursor:pointer;}
  input,select{font-family:'Inter',sans-serif;}

  /* ---------- layout shells ---------- */
  .screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .app-shell{
    min-height:100vh;
    padding:20px 20px 60px;
  }
  .wrap{max-width:860px; margin:0 auto;}

  /* ---------- chooser screen ---------- */
  .chooser-card{
    max-width:460px;
    width:100%;
    text-align:center;
  }
  .pulse-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--accent-live);
    display:inline-block;
    box-shadow:0 0 0 0 rgba(254,44,85,0.55);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(254,44,85,0.55);}
    70%{box-shadow:0 0 0 9px rgba(254,44,85,0);}
    100%{box-shadow:0 0 0 0 rgba(254,44,85,0);}
  }
  .chooser-title{
    font-size:38px;
    font-weight:700;
    margin:14px 0 6px;
    text-transform:uppercase;
  }
  .chooser-sub{
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:36px;
    line-height:1.5;
  }
  .choice-row{display:flex; flex-direction:column; gap:12px;}
  .choice-btn{
    border:1px solid var(--border);
    background:var(--bg-panel);
    color:var(--text-primary);
    padding:20px 22px;
    border-radius:10px;
    text-align:left;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:border-color .15s ease, background .15s ease;
  }
  .choice-btn:hover{border-color:#3A4150; background:var(--bg-raised);}
  .choice-btn .label{
    font-family:'Oswald',sans-serif;
    font-size:16px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .choice-btn .desc{color:var(--text-muted); font-size:12.5px; margin-top:4px;}
  .choice-btn svg{color:var(--text-faint); transition: transform 0.2s; flex-shrink: 0;}
  .choice-btn:hover svg{color:var(--text-primary); transform: translateX(4px);}
  .choice-btn.admin-btn:hover{border-color:var(--accent-cyan);}
  .choice-btn.view-btn:hover{border-color:var(--accent-live);}

  /* ---------- password screen ---------- */
  .pass-card{
    max-width:360px;
    width:100%;
  }
  .pass-card input{
    width:100%;
    background:var(--bg-panel);
    border:1px solid var(--border);
    color:var(--text-primary);
    padding:13px 14px;
    border-radius:8px;
    font-size:15px;
    margin:18px 0 10px;
    outline:none;
  }
  .pass-card input:focus{border-color:var(--accent-cyan);}
  .primary-btn{
    width:100%;
    background:var(--accent-cyan);
    color:#04191A;
    border:none;
    padding:13px 14px;
    border-radius:8px;
    font-weight:700;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .primary-btn:hover{filter:brightness(1.08);}
  .error-text{color:var(--accent-live); font-size:13px; min-height:18px; margin-top:2px;}
  .link-back{
    color:var(--text-faint);
    font-size:13px;
    background:none;
    border:none;
    margin-top:18px;
    text-decoration:underline;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .link-back:hover{color:var(--text-muted);}

  /* ---------- header ---------- */
  .top-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:26px;
    gap:12px;
    flex-wrap:wrap;
  }
  .title-block .eyebrow{margin-bottom:6px;}
  .title-block h1{
    font-size:26px;
    margin:0;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .mode-tag{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:0.1em;
    padding:4px 9px;
    border-radius:5px;
    text-transform:uppercase;
  }
  .mode-tag.view{background:rgba(254,44,85,0.12); color:var(--accent-live); border:1px solid rgba(254,44,85,0.35);}
  .mode-tag.admin{background:rgba(37,244,238,0.1); color:var(--accent-cyan); border:1px solid rgba(37,244,238,0.35);}
  .sync-status{
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--text-muted);
    background:var(--bg-panel);
    border:1px solid var(--border);
    padding:8px 12px;
    border-radius:8px;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%; background:#3DDC84;}
  .sync-dot.pending{background:#E8B84B; animation:pulse-amber 1.1s infinite;}
  .sync-dot.bad{background:var(--accent-live);}
  @keyframes pulse-amber{
    0%{box-shadow:0 0 0 0 rgba(232,184,75,0.5);}
    70%{box-shadow:0 0 0 7px rgba(232,184,75,0);}
    100%{box-shadow:0 0 0 0 rgba(232,184,75,0);}
  }
  .sync-error-banner{
    background:rgba(254,44,85,0.08);
    border:1px solid rgba(254,44,85,0.35);
    color:#FFB4C4;
    border-radius:8px;
    padding:10px 14px;
    font-size:12.5px;
    line-height:1.5;
    margin-bottom:18px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  .sync-error-banner code{
    background:rgba(0,0,0,0.25);
    padding:1px 5px;
    border-radius:4px;
    font-size:11.5px;
  }
  .retry-btn{
    flex-shrink:0;
    background:none;
    border:1px solid rgba(254,44,85,0.5);
    color:#FFB4C4;
    padding:5px 10px;
    border-radius:6px;
    font-size:11.5px;
  }
  .retry-btn:hover{background:rgba(254,44,85,0.15);}
  .exit-btn{
    background:none; border:1px solid var(--border); color:var(--text-muted);
    padding:8px 12px; border-radius:8px; font-size:12.5px;
  }
  .exit-btn:hover{color:var(--text-primary); border-color:#3A4150;}
  .header-right{display:flex; align-items:center; gap:10px;}

  /* ---------- admin tab nav ---------- */
  .tab-nav{
    display:flex;
    gap:6px;
    margin-bottom:22px;
    border-bottom:1px solid var(--border);
    padding-bottom:0;
  }
  .tab-btn{
    background:none;
    border:none;
    color:var(--text-muted);
    font-family:'Oswald',sans-serif;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:10px 4px;
    margin-right:22px;
    border-bottom:2px solid transparent;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .tab-btn .tab-count{
    background:var(--bg-raised);
    color:var(--text-faint);
    font-family:'Inter',sans-serif;
    font-size:11px;
    padding:1px 7px;
    border-radius:10px;
  }
  .tab-btn:hover{color:var(--text-primary);}
  .tab-btn.active{color:var(--accent-cyan); border-bottom-color:var(--accent-cyan);}
  .tab-btn.active .tab-count{color:var(--accent-cyan); background:rgba(37,244,238,0.12);}

  /* ---------- week nav ---------- */
  .week-nav{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:18px;
  }
  .nav-btn{
    background:var(--bg-raised); border:1px solid var(--border); color:var(--text-primary);
    width:32px;height:32px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-btn:hover{border-color:var(--accent-cyan);}
  .week-label{font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:0.03em; text-align:center;}
  .today-btn{
    background:none; border:1px solid var(--border); color:var(--text-muted);
    font-size:11.5px; padding:6px 10px; border-radius:6px; text-transform:uppercase; letter-spacing:0.05em;
  }
  .today-btn:hover{color:var(--accent-live); border-color:var(--accent-live);}

  /* ---------- day cards ---------- */
  .day-list{display:flex; flex-direction:column; gap:8px; margin-bottom:30px;}
  .day-card{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    display:grid;
    grid-template-columns: 100px 1px 1fr;
    gap:18px;
    align-items:center;
  }
  .day-card.is-today{border-color:rgba(254,44,85,0.5); background:linear-gradient(90deg, rgba(254,44,85,0.06), transparent 70%);}
  .day-date{flex-shrink:0;}
  .day-name{font-family:'Oswald',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-primary);}
  .day-num{font-size:12px; color:var(--text-muted); margin-top:2px;}
  .day-divider{width:1px; align-self:stretch; background:var(--border-soft);}
  
  .management-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    width:100%;
  }
  .assignment-block{
    display:flex;
    align-items:center;
    gap:8px;
    flex:1;
    min-width: 240px;
  }
  .topic-block{
    flex:1.2;
    min-width: 260px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .host-name-view{
    font-family:'Oswald',sans-serif; font-size:15px; letter-spacing:0.02em;
  }
  .host-name-view.empty{color:var(--text-faint); font-style:italic; font-family:'Inter',sans-serif; font-size:13px;}
  
  .topic-text-view {
    font-size:13px;
    color:var(--text-muted);
    line-height:1.4;
  }
  .topic-text-view.empty {
    color:var(--text-faint);
    font-style:italic;
  }

  .host-select{
    flex:1;
    background:var(--bg-raised);
    color:var(--text-primary);
    border:1px solid var(--border);
    padding:9px 10px;
    border-radius:7px;
    font-size:13.5px;
    outline:none;
  }
  .host-select:focus{border-color:var(--accent-cyan);}

  .topic-input{
    flex:1;
    background:var(--bg-raised);
    color:var(--text-primary);
    border:1px solid var(--border);
    padding:9px 12px;
    border-radius:7px;
    font-size:13px;
    outline:none;
    transition: border-color 0.15s;
  }
  .topic-input:focus{border-color:var(--accent-cyan); background:var(--bg-raised-2);}

  .on-air{
    font-family:'Oswald',sans-serif;
    font-size:10.5px;
    letter-spacing:0.08em;
    color:var(--accent-live);
    background:rgba(254,44,85,0.12);
    border:1px solid rgba(254,44,85,0.4);
    padding:3px 8px;
    border-radius:5px;
    display:inline-flex;
    align-items:center;
    gap:5px;
    flex-shrink:0;
  }
  .on-air .pulse-dot{width:6px;height:6px;}

  /* ---------- master list panel ---------- */
  .panel{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
  }
  .panel h2{
    font-family:'Oswald',sans-serif;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin:0 0 14px;
    color:var(--text-muted);
  }
  .host-chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
  .host-chip{
    display:flex; align-items:center; gap:8px;
    background:var(--bg-raised);
    border:1px solid var(--border);
    padding:6px 6px 6px 12px;
    border-radius:20px;
    font-size:13px;
  }
  .host-week-count {
    font-size: 11px;
    background: var(--bg-panel);
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 10px;
    border: 1px solid var(--border-soft);
  }
  .host-week-count.active-host {
    color: var(--accent-cyan);
    border-color: rgba(37,244,238,0.25);
  }
  .host-chip button{
    background:none; border:none; color:var(--text-faint);
    width:20px;height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; line-height:1;
    padding: 0;
  }
  .host-chip button:hover{color:var(--accent-live); background:rgba(254,44,85,0.12);}
  .add-host-row{display:flex; gap:8px;}
  .add-host-row input{
    flex:1;
    background:var(--bg-raised);
    border:1px solid var(--border);
    color:var(--text-primary);
    padding:10px 12px;
    border-radius:7px;
    font-size:13.5px;
    outline:none;
  }
  .add-host-row input:focus{border-color:var(--accent-cyan);}
  .add-btn{
    background:var(--accent-cyan);
    color:#04191A;
    border:none;
    padding:0 16px;
    border-radius:7px;
    font-weight:700;
    font-size:13px;
  }
  .empty-hosts{color:var(--text-faint); font-size:13px; font-style:italic;}
  .footnote{
    color:var(--text-faint);
    font-size:11.5px;
    margin-top:22px;
    text-align:center;
    line-height:1.6;
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- Standard Browser Compatibility Loading Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDQ9hs030NaJy2NoznP1bCSNa-eIRs4Kkg",
  authDomain: "liveschedule-f6036.firebaseapp.com",
  databaseURL: "https://liveschedule-f6036-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "liveschedule-f6036",
  storageBucket: "liveschedule-f6036.firebasestorage.app",
  messagingSenderId: "424904123728",
  appId: "1:424904123728:web:3d2213361a78b2147b3855"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const scheduleRef = db.ref("liveHostSchedule");
const hostsRef = db.ref("liveHostSchedule/hosts");
function assignmentRef(dateKey){ return db.ref("liveHostSchedule/assignments/" + dateKey); }

const ADMIN_PASSWORD = "NAN2221#";
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"]; 
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let state = {
  screen: "select", 
  isAdmin: false,
  passError: "",
  data: { hosts: [], assignments: {} },
  weekStart: getSundayOf(new Date()),
  synced: false,
  newHostName: "",
  adminPage: "schedule", 
  dbReady: false,
  connectionState: "connecting", 
  saveState: "idle", 
  syncError: "",
};

function syncStatusHTML(){
  if(state.connectionState === "error"){
    return `<span class="sync-dot bad"></span>Disconnected`;
  }
  if(state.connectionState === "connecting"){
    return `<span class="sync-dot pending"></span>Connecting…`;
  }
  if(state.saveState === "saving"){
    return `<span class="sync-dot pending"></span>Saving…`;
  }
  if(state.saveState === "error"){
    return `<span class="sync-dot bad"></span>Save error`;
  }
  return `<span class="sync-dot"></span>Synced`;
}

function pad(n){ return n < 10 ? "0"+n : ""+n; }
function toKey(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function getSundayOf(date){
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}
function sameDate(a,b){ return toKey(a) === toKey(b); }

const chevronRight = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`;
const chevronLeft = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`;
const lockIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;

function render(){
  const root = document.getElementById("root");
  if(state.screen === "select") root.innerHTML = renderChooser();
  else if(state.screen === "admin-pass") root.innerHTML = renderPassword();
  else root.innerHTML = renderMain();
  attachHandlers();
}

function renderChooser(){
  return `
  <div class="screen">
    <div class="chooser-card">
      <span class="pulse-dot"></span>
      <div class="chooser-title display">Live Host Schedule</div>
      <div class="chooser-sub">Weekly broadcast roster & stream planner<br/>Sunday&nbsp;&ndash;&nbsp;Friday cycle</div>
      <div class="choice-row">
        <button class="choice-btn view-btn" data-action="go-view">
          <div>
            <div class="label">Schedule Matrix</div>
            <div class="desc">Open dashboard view · dynamic stream details</div>
          </div>
          ${chevronRight}
        </button>
        <button class="choice-btn admin-btn" data-action="go-admin-pass">
          <div>
            <div class="label">Admin Management</div>
            <div class="desc">Password protected · edit hosts & content matrix</div>
          </div>
          ${chevronRight}
        </button>
      </div>
    </div>
  </div>`;
}

function renderPassword(){
  return `
  <div class="screen">
    <div class="pass-card">
      <div class="eyebrow">Authorization</div>
      <div class="chooser-title display" style="font-size:26px; text-align:left; margin-top:8px;">Enter Admin Password</div>
      <input type="password" id="pass-input" placeholder="••••••••" autocomplete="off" />
      <div class="error-text">${state.passError}</div>
      <button class="primary-btn" data-action="submit-pass">${lockIcon} Unlock Admin</button>
      <br/>
      <button class="link-back" data-action="back-to-select">${chevronLeft} Back</button>
    </div>
  </div>`;
}

function renderMain(){
  const days = [];
  for(let i=0;i<6;i++) days.push(addDays(state.weekStart,i));
  const today = new Date();
  const weekEnd = days[5];
  const weekLabel = `${MONTH_NAMES[days[0].getMonth()]} ${days[0].getDate()} — ${weekEnd.getMonth()!==days[0].getMonth() ? MONTH_NAMES[weekEnd.getMonth()]+' ' : ''}${weekEnd.getDate()}, ${weekEnd.getFullYear()}`;

  const hosts = state.data.hosts || [];
  const assignments = state.data.assignments || {};

  const hostCountsThisWeek = {};
  hosts.forEach(h => hostCountsThisWeek[h] = 0);
  days.forEach(d => {
    const key = toKey(d);
    const assignedObj = assignments[key];
    const assignedHost = (assignedObj && typeof assignedObj === 'object') ? assignedObj.host : assignedObj;
    if (assignedHost && hostCountsThisWeek[assignedHost] !== undefined) {
      hostCountsThisWeek[assignedHost]++;
    }
  });

  const dayCards = days.map((d,i)=>{
    const key = toKey(d);
    const isToday = sameDate(d, today);
    const assignmentNode = assignments[key] || "";
    
    let assignedHost = "";
    let streamTopic = "";
    if (assignmentNode && typeof assignmentNode === 'object') {
      assignedHost = assignmentNode.host || "";
      streamTopic = assignmentNode.topic || "";
    } else {
      assignedHost = assignmentNode;
    }

    const onAirBadge = (isToday && assignedHost) ? `<span class="on-air"><span class="pulse-dot"></span>LIVE</span>` : "";

    let managementRowHTML = "";
    if(state.isAdmin){
      const knownList = hosts.includes(assignedHost) || !assignedHost ? hosts : [assignedHost, ...hosts];
      const options = ['<option value="">— Unassigned —</option>']
        .concat(knownList.map(h => `<option value="${escapeAttr(h)}" ${h===assignedHost?'selected':''}>${escapeHtml(h)}</option>`))
        .join("");

      managementRowHTML = `
      <div class="management-row">
        <div class="assignment-block">
          <select class="host-select" data-date="${key}" data-action="assign-host">${options}</select>
          ${onAirBadge}
        </div>
        <div class="topic-block">
          <input type="text" class="topic-input" data-date="${key}" data-action="update-topic" placeholder="Add broadcast topic or notes..." value="${escapeAttr(streamTopic)}" />
        </div>
      </div>`;
    } else {
      const hostDisplay = assignedHost 
        ? `<span class="host-name-view">${escapeHtml(assignedHost)}</span>` 
        : `<span class="host-name-view empty">Unassigned</span>`;
      
      const topicDisplay = streamTopic 
        ? `<span class="topic-text-view">${escapeHtml(streamTopic)}</span>`
        : `<span class="topic-text-view empty">No topic set</span>`;

      managementRowHTML = `
      <div class="management-row">
        <div class="assignment-block">
          ${hostDisplay}
          ${onAirBadge}
        </div>
        <div class="topic-block">
          ${topicDisplay}
        </div>
      </div>`;
    }

    return `
    <div class="day-card ${isToday?'is-today':''}">
      <div class="day-date">
        <div class="day-name">${DAY_NAMES[i]}</div>
        <div class="day-num">${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}</div>
      </div>
      <div class="day-divider"></div>
      ${managementRowHTML}
    </div>`;
  }).join("");

  const masterPanel = `
    <div class="panel">
      <h2>Active Network Roster & Weekly Loads</h2>
      <div class="host-chip-row">
        ${hosts.length ? hosts.map(h => {
          const count = hostCountsThisWeek[h] || 0;
          return `
          <div class="host-chip">
            <span>${escapeHtml(h)}</span>
            <span class="host-week-count ${count > 0 ? 'active-host' : ''}" title="Assignments this selected week">${count}w</span>
            <button data-action="remove-host" data-host="${escapeAttr(h)}" title="Remove host">&times;</button>
          </div>`;
        }).join("") : '<div class="empty-hosts">No active team hosts recorded. Add your first team member below.</div>'}
      </div>
      <div class="add-host-row">
        <input id="new-host-input" type="text" placeholder="Legal or profile handle name" value="${escapeAttr(state.newHostName)}" />
        <button class="add-btn" data-action="add-host">Add Host</button>
      </div>
    </div>`;

  const schedulePage = `
    <div class="week-nav">
      <button class="nav-btn" data-action="prev-week" title="Previous Week">${chevronLeft}</button>
      <div>
        <div class="week-label">${weekLabel}</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="today-btn" data-action="this-week">Current Week</button>
        <button class="nav-btn" data-action="next-week" title="Next Week">${chevronRight}</button>
      </div>
    </div>
    <div class="day-list">${dayCards}</div>`;

  const tabNav = state.isAdmin ? `
    <div class="tab-nav">
      <button class="tab-btn ${state.adminPage==='schedule'?'active':''}" data-action="tab-schedule">Live Matrix Planner</button>
      <button class="tab-btn ${state.adminPage==='masters'?'active':''}" data-action="tab-masters">Host Profiles & Metrics <span class="tab-count">${hosts.length}</span></button>
    </div>` : "";

  let pageContent = (!state.isAdmin || state.adminPage === "schedule") ? schedulePage : masterPanel;

  const footnoteText = state.isAdmin
    ? "Realtime Matrix Control active. Content nodes modifications apply instantly across active view terminals."
    : "Live schedule connection active. Terminal monitors modifications in real-time updates.";

  const hasError = state.connectionState === "error" || state.saveState === "error";
  const errorBanner = hasError ? `
    <div class="sync-error-banner">
      <div>
        <strong>${state.connectionState === "error" ? "Network connection interrupted." : "Database sync engine rejected payload modification."}</strong><br/>
        ${state.syncError ? `<code>${escapeHtml(state.syncError)}</code>` : "System authorization anomaly details unrecorded."}
      </div>
      <button class="retry-btn" data-action="retry-sync">Retry Sync</button>
    </div>` : "";

  return `
  <div class="app-shell">
    <div class="wrap">
      <div class="top-row">
        <div class="title-block">
          <div class="eyebrow">On-Air Tracking Dashboard</div>
          <h1 class="display">Live Host Schedule
            <span class="mode-tag ${state.isAdmin?'admin':'view'}">${state.isAdmin?'Admin Operator':'Monitor Mode'}</span>
          </h1>
        </div>
        <div class="header-right">
          <div class="sync-status">${syncStatusHTML()}</div>
          <button class="exit-btn" data-action="exit-to-select">Disconnect View</button>
        </div>
      </div>

      ${errorBanner}
      ${tabNav}
      ${pageContent}

      <div class="footnote">${footnoteText}</div>
    </div>
  </div>`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

function attachHandlers(){
  document.querySelectorAll("[data-action]").forEach(el=>{
    const action = el.getAttribute("data-action");
    
    if(action === "assign-host"){
      el.addEventListener("change", async (e)=>{
        const date = el.getAttribute("data-date");
        const val = e.target.value;
        
        let currentRecord = state.data.assignments[date] || { host: "", topic: "" };
        if (typeof currentRecord !== 'object') currentRecord = { host: currentRecord, topic: "" };

        if(!val && !currentRecord.topic) {
          delete state.data.assignments[date];
          await saveAssignment(date, null);
        } else {
          currentRecord.host = val;
          state.data.assignments[date] = currentRecord;
          await saveAssignment(date, currentRecord);
        }
      });
      return;
    }

    if(action === "update-topic"){
      el.addEventListener("change", async (e)=>{
        const date = el.getAttribute("data-date");
        const val = e.target.value.trim();
        
        let currentRecord = state.data.assignments[date] || { host: "", topic: "" };
        if (typeof currentRecord !== 'object') currentRecord = { host: currentRecord, topic: "" };

        if(!val && !currentRecord.host) {
          delete state.data.assignments[date];
          await saveAssignment(date, null);
        } else {
          currentRecord.topic = val;
          state.data.assignments[date] = currentRecord;
          await saveAssignment(date, currentRecord);
        }
      });
      return;
    }

    el.addEventListener("click", async (e)=>{
      if(action === "go-view"){
        state.isAdmin = false;
        state.screen = "main";
        render();
      } else if(action === "go-admin-pass"){
        state.screen = "admin-pass";
        state.passError = "";
        render();
        setTimeout(()=>{ const i=document.getElementById("pass-input"); if(i) i.focus(); },0);
      } else if(action === "back-to-select"){
        state.screen = "select";
        render();
      } else if(action === "submit-pass"){
        const val = document.getElementById("pass-input").value;
        if(val === ADMIN_PASSWORD){
          state.isAdmin = true;
          state.screen = "main";
          state.adminPage = "schedule";
          state.passError = "";
          render();
        } else {
          state.passError = "Invalid administrative cryptographic signature keys.";
          render();
          setTimeout(()=>{ const i=document.getElementById("pass-input"); if(i) i.focus(); },0);
        }
      } else if(action === "exit-to-select"){
        state.isAdmin = false;
        state.screen = "select";
        render();
      } else if(action === "prev-week"){
        state.weekStart = addDays(state.weekStart, -7);
        render();
      } else if(action === "next-week"){
        state.weekStart = addDays(state.weekStart, 7);
        render();
      } else if(action === "this-week"){
        state.weekStart = getSundayOf(new Date());
        render();
      } else if(action === "tab-schedule"){
        state.adminPage = "schedule";
        render();
      } else if(action === "tab-masters"){
        state.adminPage = "masters";
        render();
      } else if(action === "add-host"){
        const input = document.getElementById("new-host-input");
        const name = (input.value || "").trim();
        if(!name) return;
        if(state.data.hosts.includes(name)){
          input.value = "";
          return;
        }
        input.value = "";
        await addHostRemote(name);
      } else if(action === "remove-host"){
        const host = el.getAttribute("data-host");
        await removeHostRemote(host);
      } else if(action === "retry-sync"){
        if(lastFailedRetry){
          await lastFailedRetry();
        } else {
          state.connectionState = "connecting";
          render();
        }
      }
    });
  });

  const passInput = document.getElementById("pass-input");
  if(passInput){
    passInput.addEventListener("keydown", (e)=>{
      if(e.key === "Enter") document.querySelector('[data-action="submit-pass"]').click();
    });
  }
  const newHostInput = document.getElementById("new-host-input");
  if(newHostInput){
    newHostInput.addEventListener("keydown", (e)=>{
      if(e.key === "Enter") document.querySelector('[data-action="add-host"]').click();
    });
  }
}

let lastFailedRetry = null;

async function saveAssignment(dateKey, payloadOrNull){
  state.saveState = "saving";
  render();
  try{
    await assignmentRef(dateKey).set(payloadOrNull);
    state.saveState = "saved";
    state.syncError = "";
    lastFailedRetry = null;
  } catch(err){
    state.saveState = "error";
    state.syncError = (err && err.message) ? err.message : String(err);
    lastFailedRetry = () => saveAssignment(dateKey, payloadOrNull);
    console.error("Firebase assignment write failure details:", err);
  }
  render();
}

async function addHostRemote(name){
  state.saveState = "saving";
  render();
  try{
    await hostsRef.transaction((current)=>{
      const list = Array.isArray(current) ? current.slice() : [];
      if(!list.includes(name)) list.push(name);
      return list;
    });
    state.saveState = "saved";
    state.syncError = "";
    lastFailedRetry = null;
  } catch(err){
    state.saveState = "error";
    state.syncError = (err && err.message) ? err.message : String(err);
    lastFailedRetry = () => addHostRemote(name);
    console.error("Firebase remote registration error:", err);
  }
  render();
}

async function removeHostRemote(name){
  state.saveState = "saving";
  render();
  try{
    await hostsRef.transaction((current)=>{
      const list = Array.isArray(current) ? current.slice() : [];
      return list.filter(h => h !== name);
    });
    state.saveState = "saved";
    state.syncError = "";
    lastFailedRetry = null;
  } catch(err){
    state.saveState = "error";
    state.syncError = (err && err.message) ? err.message : String(err);
    lastFailedRetry = () => removeHostRemote(name);
    console.error("Firebase destructive mutation error:", err);
  }
  render();
}

scheduleRef.on("value", (snapshot)=>{
  const val = snapshot.val();
  state.data = (val && typeof val === "object") ? {
    hosts: Array.isArray(val.hosts) ? val.hosts : [],
    assignments: (val.assignments && typeof val.assignments === "object") ? val.assignments : {},
  } : { hosts: [], assignments: {} };
  state.dbReady = true;
  state.connectionState = "connected";
  state.syncError = "";
  if(state.saveState !== "saving") state.saveState = "idle";
  render();
}, (error)=>{
  state.connectionState = "error";
  state.syncError = (error && error.message) ? error.message : String(error);
  console.error("Realtime listener synchronization fault:", error);
  render();
});

render();
</script>
</body>
</html>
